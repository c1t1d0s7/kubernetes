apiVersion: v1
kind: Pod
metadata:
  name: mynapp-pod-cfg
spec:
  containers:
  - image: nginx
    name: mynapp
    volumeMounts:
    - name: nginx-config
      mountPath: /etc/nginx/conf.d
    ports:
    - containerPort: 80
      protocol: TCP
  volumes:
  - name: nginx-config
    configMap:
      name: nginx-gzip-config
